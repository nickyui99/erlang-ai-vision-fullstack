<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AI vision console for Erlang cameras, agents, events, and edge sync.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Erlang AI Vision">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=2"/>

  <title>Erlang AI Vision</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // Match the splash to the app's persisted theme before first paint.
    // shared_preferences stores strings JSON-encoded under a "flutter." prefix.
    try {
      if ((localStorage.getItem('flutter.theme_mode') || '').includes('dark')) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (_) {}
  </script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background-color: #F7F8FA;
    }
    html[data-theme="dark"], html[data-theme="dark"] body {
      background-color: #090D12;
    }
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background-color: inherit;
      transition: opacity 0.3s ease-out;
    }
    #splash img {
      width: 88px;
      height: 88px;
      border-radius: 20px;
      animation: splash-pulse 1.6s ease-in-out infinite;
    }
    #splash .splash-label {
      font: 500 14px/1 system-ui, -apple-system, "Segoe UI", sans-serif;
      letter-spacing: 0.04em;
      color: #667085;
    }
    html[data-theme="dark"] #splash .splash-label {
      color: #98A2B3;
    }
    @keyframes splash-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.94); opacity: 0.75; }
    }
  </style>
</head>
<body>
  <div id="splash">
    <img src="icons/Icon-192.png" alt="">
    <span class="splash-label">Erlang AI Vision</span>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (!splash) return;
      splash.style.opacity = '0';
      splash.addEventListener('transitionend', function () { splash.remove(); });
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
