<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">Measured EdgeAgent results</title>
  <desc id="desc">A compact summary of bandwidth reduction, cloud escalation latency, Qwen latency, cost and false-positive measurement status.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#080b10"/><stop offset="1" stop-color="#111a27"/></linearGradient>
    <linearGradient id="accent" x1="0" x2="1"><stop stop-color="#f04a34"/><stop offset="1" stop-color="#ff8a3d"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity=".3"/></filter>
  </defs>
  <rect width="1400" height="720" rx="28" fill="url(#bg)"/>
  <path d="M0 0h1400v7H0z" fill="url(#accent)"/>
  <g font-family="Inter,Arial,sans-serif">
    <text x="74" y="96" fill="#f7f8fa" font-size="42" font-weight="800">Measured EdgeAgent results</text>
    <text x="74" y="135" fill="#98a4b5" font-size="21">180 s CPU-only edge benchmark · 5 real Qwen Cloud image-verification calls · July 2026</text>
    <g filter="url(#shadow)">
      <rect x="74" y="182" width="588" height="310" rx="20" fill="#151f2d" stroke="#26364b"/>
      <rect x="704" y="182" width="300" height="310" rx="20" fill="#151f2d" stroke="#26364b"/>
      <rect x="1030" y="182" width="296" height="310" rx="20" fill="#151f2d" stroke="#26364b"/>
    </g>
    <text x="112" y="234" fill="#ff8a3d" font-size="18" font-weight="700" letter-spacing="1.6">CLOUD-BOUND BANDWIDTH</text>
    <text x="112" y="341" fill="#f7f8fa" font-size="102" font-weight="800">98.8%</text>
    <text x="112" y="385" fill="#c7d0dc" font-size="26">lower egress · about 83× less data</text>
    <rect x="112" y="421" width="486" height="18" rx="9" fill="#2a3443"/>
    <rect x="112" y="421" width="6" height="18" rx="3" fill="#f04a34"/>
    <text x="112" y="473" fill="#98a4b5" font-size="20">106.99 MB camera ingress → 1.30 MB cloud egress</text>
    <text x="738" y="234" fill="#ff8a3d" font-size="16" font-weight="700" letter-spacing="1.2">EDGE → CLOUD</text>
    <text x="738" y="302" fill="#f7f8fa" font-size="43" font-weight="800">12.9 s</text>
    <text x="738" y="335" fill="#98a4b5" font-size="18">candidate → escalation p50</text>
    <text x="738" y="395" fill="#f7f8fa" font-size="43" font-weight="800">20.7 s</text>
    <text x="738" y="428" fill="#98a4b5" font-size="18">candidate → escalation p95</text>
    <text x="1064" y="234" fill="#ff8a3d" font-size="16" font-weight="700" letter-spacing="1.2">QWEN CLOUD · N=5</text>
    <text x="1064" y="302" fill="#f7f8fa" font-size="43" font-weight="800">2.47 s</text>
    <text x="1064" y="335" fill="#98a4b5" font-size="18">vision call p50</text>
    <text x="1064" y="395" fill="#f7f8fa" font-size="43" font-size-adjust="none" font-weight="800">2.59 s</text>
    <text x="1064" y="428" fill="#98a4b5" font-size="18">vision call p95</text>
    <rect x="74" y="536" width="1252" height="110" rx="18" fill="#0d131c" stroke="#26364b"/>
    <text x="112" y="582" fill="#98a4b5" font-size="18" font-weight="700" letter-spacing="1.2">APPROX. QWEN COST / EVENT</text>
    <text x="112" y="625" fill="#f7f8fa" font-size="36" font-weight="800">US$0.00027</text>
    <line x1="465" y1="560" x2="465" y2="622" stroke="#26364b" stroke-width="2"/>
    <text x="506" y="582" fill="#98a4b5" font-size="18" font-weight="700" letter-spacing="1.2">FALSE-POSITIVE REDUCTION</text>
    <text x="506" y="625" fill="#f7f8fa" font-size="27" font-weight="700">Awaiting labelled baseline</text>
    <text x="1030" y="626" text-anchor="end" fill="#6f7c8f" font-size="16">Scope and methodology in README</text>
  </g>
</svg>
