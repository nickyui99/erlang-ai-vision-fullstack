services:
  backend:
    # Local `docker compose up` builds from source. On a deploy target, set
    # BACKEND_IMAGE to a pushed tag and compose runs that image instead of building.
    image: ${BACKEND_IMAGE:-erlang-backend:local}
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
